<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所属ライバー紹介 - Chime lab（キメラボ）</title>
  <meta name="description" content="Chime lab（キメラボ）所属の個性豊かなVライバーたちをご紹介。魔物から獣人、天使や悪魔など様々なキメラが活動中！">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- 共通CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <!-- ================= ヘッダー ================= -->
  <div id="header"></div>

  <!-- ================= メイン ================= -->
  <main class="section">
    <div class="container">
      <section class="livers">
        <h2>所属ライバー紹介</h2>
        <p class="intro-text">個性豊かで魅力的なChime lab所属ライバーたちをご紹介します。</p>

        <div class="liver-grid">

          <!-- 百彩 イト -->
          <div class="liver-card" data-link="liver-ito.html">
            <img src="img/ito_momoiro1.png" alt="百彩 イト">
            <h3>百彩 イト</h3>
            <p>百の彩を持つウサギのキメラ。</p>
          </div>

          <!-- 星々来 びび -->
          <div class="liver-card" data-link="liver-bibi.html">
            <img src="img/Bibi_sesera1.png" alt="星々来 びび">
            <h3>星々来 びび</h3>
            <p>星を愛するイッカククジラのキメラ。</p>
          </div>

          <!-- ノエル・ミュージック -->
          <div class="liver-card" data-link="liver-noel.html">
            <img src="img/noel_musick1.png" alt="ノエル・ミュージック">
            <h3>ノエル・ミュージック</h3>
            <p>美しい白鳥のキメラ。</p>
          </div>

          <!-- 鮭延 ヤヲ -->
          <div class="liver-card" data-link="liver-yawo.html">
            <img src="img/sanobe_yawo1.png" alt="鮭延 ヤヲ">
            <h3>鮭延 ヤヲ</h3>
            <p>200年生きた漫画家の猫又</p>
          </div>

          <!-- SECRET -->
          <div class="liver-card">
            <img src="img/secret.png" alt="SECRET">
            <h3>SECRET</h3>
            <p>COMING SOON...</p>
          </div>

        </div>
      </section>
    </div>
  </main>

  <!-- ================= フッター ================= -->
  <footer class="footer">
    <div class="logo">Chime lab</div>
    <div class="footer-bottom">© 2025 Chime lab All Rights Reserved.</div>
  </footer>

  <!-- ================= JS ================= -->

  <!-- カードクリックでページ遷移 -->
  <script>
    document.querySelectorAll('.liver-card').forEach(card => {
      const link = card.dataset.link;
      if (link) {
        card.style.cursor = 'pointer';
        card.addEventListener('click', () => {
          window.location.href = link;
        });
      }
    });
  </script>

  <!-- 共通ヘッダー読み込み -->
  <script>
    fetch('header.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;

        // ハンバーガーメニュー
        const menuToggle = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav');
        if (menuToggle && nav) {
          menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            nav.classList.toggle('active');
          });
        }

        // 現在ページのナビをハイライト
        const current = location.pathname.split('/').pop();
        document.querySelectorAll('.nav a').forEach(link => {
          if (link.getAttribute('href') === current) {
            link.classList.add('active-nav');
          }
        });
      })
      .catch(err => console.error('ヘッダー読み込みエラー:', err));
  </script>

</body>

</html>
