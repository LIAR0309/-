<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chime lab（キメラボ）- 応募フォーム</title>
  <meta name="description" content="Chime lab（キメラボ）への応募はこちらから。">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- 共通CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdB0clUdTaix4sp4EuvFc8rsJu20uftT0auPhXNphUF03ljwA/viewform";
      const go = confirm("Googleフォームへ移動します。よろしいですか？");

      if (go) {
        window.location.href = formURL;
      } else {
        document.getElementById("message").style.display = "block";
      }
    });
  </script>
</head>

<body>
  <!-- ✅ 共通ヘッダー -->
  <div id="header"></div>

  <main class="main-content">
    <div id="message" style="display: none;">
      <p>Googleフォームへの移動をキャンセルしました。</p>
      <p>応募する場合は、以下のリンクからアクセスしてください。</p>
      <br>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdB0clUdTaix4sp4EuvFc8rsJu20uftT0auPhXNphUF03ljwA/viewform"
        target="_blank" rel="noopener noreferrer" class="button button-primary">
        <i class="fas fa-external-link-alt"></i> 応募フォームを開く
      </a>
    </div>

    <noscript>
      <p>
        JavaScriptが無効になっています。自動的に応募フォームへ移動できません。<br>
        以下のリンクをクリックして移動してください。<br><br>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdB0clUdTaix4sp4EuvFc8rsJu20uftT0auPhXNphUF03ljwA/viewform"
          target="_blank" rel="noopener noreferrer" class="button button-primary">
          応募フォームを開く
        </a>
      </p>
    </noscript>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="logo">Chime lab</div>
      <div class="footer-bottom">&copy; 2025 Chime lab（キメラボ）</div>
    </div>
  </footer>

  <!-- ✅ 共通ヘッダー読込スクリプト -->
  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;

        const menuToggle = document.getElementById("menu-toggle");
        const nav = document.getElementById("nav");

        if (menuToggle && nav) {
          menuToggle.addEventListener("click", () => {
            menuToggle.classList.toggle("active");
            nav.classList.toggle("active");
          });
        }

        const current = location.pathname.split("/").pop();
        document.querySelectorAll('.nav a').forEach(link => {
          if (link.getAttribute('href') === current) {
            link.classList.add('active-nav');
          }
        });
      })
      .catch(err => console.error("ヘッダー読み込みエラー:", err));
  </script>
</body>

</html>
