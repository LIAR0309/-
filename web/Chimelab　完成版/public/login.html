<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chimelab | Access Denied</title>
  <style>
    :root {
      --primary: #00ffe1;
      --bg: #050505;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--primary);
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .login-box {
      border: 1px solid var(--primary);
      padding: 40px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0, 255, 225, 0.2);
      text-align: center;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 5px;
      opacity: 0.7;
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--primary);
      color: var(--primary);
      padding: 5px 0;
      outline: none;
    }

    button {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      background: var(--primary);
      color: var(--bg);
      box-shadow: 0 0 15px var(--primary);
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h1>CHIMELAB LOGIN</h1>
    <div class="input-group">
      <label>OPERATOR ID</label>
      <input type="text" value="LAB-Ω13" readonly>
    </div>
    <div class="input-group">
      <label>AUTH CODE</label>
      <input type="password" value="********" readonly>
    </div>
    <button onclick="window.location.href='/admin'">Execute Login</button>
  </div>
</body>

</html>
