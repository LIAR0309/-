<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Chimelab Terminal</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #001010, #000);
      color: #00ffe1;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .terminal {
      width: 420px;
      border: 1px solid #00ffe1;
      padding: 30px;
      box-shadow: 0 0 20px #00ffe1;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }

    .field {
      margin-bottom: 15px;
    }

    .label {
      font-size: 14px;
      opacity: 0.8;
    }

    .value {
      margin-top: 5px;
      height: 20px;
      white-space: nowrap;
      overflow: hidden;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0;
      }
    }

    .status {
      margin-top: 20px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .welcome {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      opacity: 0;
      transition: opacity 1s;
    }
  </style>
</head>

<body>

  <div class="terminal" id="terminal">
    <h1>CHIMELAB SECRET TERMINAL
    </h1>

    <div class="field">
      <div class="label">USER ID</div>
      <div class="value" id="id"></div>
    </div>

    <div class="field">
      <div class="label">PASSWORD</div>
      <div class="value" id="pw"></div>
    </div>

    <div class="status" id="status">ACCESS </div>
  </div>

  <div class="welcome" id="welcome">
    Welcome to SECRET Chimelab
  </div>

  <script>
    const userId = "LAB-Ω13";
    const password = "************";

    let i = 0;
    let j = 0;

    function typeId() {
      if (i < userId.length) {
        document.getElementById("id").textContent += userId[i];
        i++;
        setTimeout(typeId, 100);
      } else {
        document.getElementById("id").innerHTML += '<span class="cursor">█</span>';
        setTimeout(typePw, 500);
      }
    }

    function typePw() {
      if (j < password.length) {
        document.getElementById("pw").textContent += "●";
        j++;
        setTimeout(typePw, 80);
      } else {
        setTimeout(showStatus, 500);
      }
    }

    function showStatus() {
      const status = document.getElementById("status");
      status.style.opacity = "1";

      setTimeout(showWelcome, 1500);
    }

    function showWelcome() {
      document.getElementById("terminal").style.display = "none";
      const welcome = document.getElementById("welcome");
      welcome.style.opacity = "1";

      setTimeout(() => {
        window.location.href = "secret.html"; // 秘密ページ
      }, 2500);
    }

    // 起動
    setTimeout(typeId, 1000);
  </script>

</body>

</html>
